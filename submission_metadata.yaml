ai_usage_summary: |
  Used Claude for architecture discussion, code review and guidance.
  No candidate data was fed to any LLM. All ranking logic is original
  rule-based code running fully offline.

methodology_summary: |
  Rule-based ranker with 5 scoring components: career substance (30%),
  skills match (25%), experience fit (20%), location (15%), education (10%).
  Hard filters eliminate 90%+ of candidates instantly. Honeypot detection
  removes impossible profiles. Behavioral signal multiplier reorders by
  availability, responsiveness, notice period and GitHub activity.
  Runs in under 2 seconds on 100K candidates, fully CPU-based, no network.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true